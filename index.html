<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Calculate me! - A calculator made by me</title>
    <link href="style.css" rel="stylesheet" type="text/css " />
    <link href="utils.css" rel="stylesheet" type="text/css " />
</head>

<body>
    <h1 class="text-center">Welcome to Calculate me!</h1>
    <div class="container flex flex-col items-center  mx-auto m-w-20">
        <div class="row">
            <input class="input" type="text" />
        </div>
         <div class="row">
            <button class="buttons">On</button>
            <button class="buttons">Clr</button>
            <button class="buttons">Del</button>
            <button class="buttons">S=D</button>
            
        </div>
        <div class="row">
            <!-- <button class="buttons"style="padding: 20px">7</button> -->
            <button class="buttons">7</button>
            <button class="buttons">8</button>
            <button class="buttons">9</button>
            <button class="buttons">*</button>
        </div>
        <div class="row">
            <button class="buttons">4</button>
            <button class="buttons">5</button>
            <button class="buttons">6</button>
            <button class="buttons">/</button>
        </div>
        <div class="row">
            <button class="buttons">1</button>
            <button class="buttons">2</button>
            <button class="buttons">3</button>
            <button class="buttons">+</button>
        </div>
        <div class="row">
            <button class="buttons">0</button>
            <button class="buttons">.</button>
             <button class="buttons">%</button>
            <button class="buttons">-</button>
           
        </div>
        <div class="row">
            <button class="buttons">Tan</button>
            <button class="buttons">Cos</button>
            <button class="buttons">Off</button>
             <button class="buttons">=</button>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
